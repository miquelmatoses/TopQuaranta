{% extends "comptes/email_base.html" %}
{% block pretitle %}Nou missatge{% endblock %}
{% block content %}
<h1 style="font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:900;color:#fff;margin:0 0 14px;line-height:1.2;">
  {{ remitent_nom }} t'ha enviat un missatge
</h1>
<p style="margin:0 0 6px;color:#9ca3af;font-size:12px;text-transform:uppercase;letter-spacing:1px;">
  Assumpte
</p>
<p style="margin:0 0 16px;font-weight:700;color:#fff;">
  {{ assumpte }}
</p>
<div style="border-left:3px solid #facc15;padding:10px 14px;background:#0a0a0a;color:#d1d5db;font-size:14px;line-height:1.5;margin-bottom:18px;white-space:pre-wrap;">{{ preview }}</div>
<p style="margin:24px 0;text-align:center;">
  <a href="{{ link }}" style="display:inline-block;background:#facc15;color:#0a0a0a;font-weight:700;font-size:15px;text-decoration:none;padding:12px 24px;border-radius:8px;">
    Respondre
  </a>
</p>
<p style="margin:0;color:#9ca3af;font-size:11px;">
  Pots desactivar aquestes notificacions al teu perfil (/compte/perfil-usuari).
</p>
{% endblock %}
