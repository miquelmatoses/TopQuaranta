{% extends "base.html" %}

{% block title %}Mapa — {{ block.super }}{% endblock %}
{% block body_class %}map-page{% endblock %}

{% block extra_css %}
<style>
  .map-container { width: 100%; min-height: 600px; position: relative; }
  #map { width: 100%; height: 600px; }
  .map-sidebar { margin-top: 1rem; }
  .map-artist-list { list-style: none; padding: 0; }
  .map-artist-list li { padding: .5rem 0; border-bottom: 1px solid var(--border); }
</style>
{% endblock %}

{% block content %}
<h1>{{ page.title }}</h1>

<div class="map-container">
  <div id="map"></div>
</div>

<div class="map-sidebar">
  <div id="map-results"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function(){
  var apiBase = '{{ page.url }}api/artistes/';

  function loadArtists(level, key) {
    var url = apiBase + '?level=' + encodeURIComponent(level) + '&key=' + encodeURIComponent(key);
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var el = document.getElementById('map-results');
        if (!data.items || !data.items.length) {
          el.innerHTML = '<p>No s\'han trobat artistes.</p>';
          return;
        }
        var html = '<p>' + data.count + ' artistes</p><ul class="map-artist-list">';
        data.items.forEach(function(a){
          html += '<li><a href="' + a.href + '">' + a.nom + '</a>';
          if (a.comarca) html += ' <small>(' + a.comarca + ')</small>';
          html += '</li>';
        });
        html += '</ul>';
        el.innerHTML = html;
      });
  }

  window.loadMapArtists = loadArtists;
})();
</script>
{% endblock %}
