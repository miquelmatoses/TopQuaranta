<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname
    const search = window.location.search
    const hash = window.location.hash
    // Always redirect through the SPA entry point.
    // index.html restores the original path via replaceState.
    // hash is appended raw so Supabase can read access_token fragments.
    window.location.replace(
      '/?p=' + encodeURIComponent(path + search) + hash
    )
  </script>
</head>
</html>
