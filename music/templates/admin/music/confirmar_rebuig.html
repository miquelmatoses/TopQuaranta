{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}Confirmar rebuig{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <input type="hidden" name="action" value="{{ action_name }}">
    {% for obj in queryset %}
    <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
    {% endfor %}

    <p>S'afectaran <strong>{{ total_cancons }}</strong> cançons de <strong>{{ total_albums }}</strong> àlbums.</p>

    <fieldset>
        <legend>Motiu del rebuig</legend>
        <p>
            <select name="motiu" required style="padding: 6px; min-width: 300px;">
                <option value="">-- Selecciona un motiu --</option>
                {% for value, label in motius %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </p>
    </fieldset>

    <br>
    <input type="submit" name="confirmar" value="Confirmar rebuig" class="default">
    <a href="{{ cancel_url }}" style="margin-left: 10px;">Cancel·lar</a>
</form>
{% endblock %}
