{% extends "web/base.html" %}
{% load static %}

{% block title %}Ranquings — TopQuaranta{% endblock %}

{% block content %}
<section class="selector-page">
  <h1 class="selector-title">Ranquings</h1>
  <p class="selector-subtitle">Tria un territori per veure el seu Top 40 setmanal</p>

  <!-- PPCC — featured card on top -->
  <div class="selector-featured">
    <a href="{% url 'web:ranking' %}?t=ppcc" class="selector-card selector-card--ppcc selector-card--featured">
      <img src="{% static 'mm-design/icons/territories/territory-ppcc.svg' %}" alt="" class="selector-badge" width="100" height="100">
      <h2 class="selector-card-title">{{ ppcc.nom }}</h2>
      <p class="selector-card-desc">{{ ppcc.desc }}</p>
    </a>
  </div>

  <!-- All territories — flat grid, same visual weight -->
  <div class="selector-grid">
    {% for t in territoris %}
    <a href="{% url 'web:ranking' %}?t={{ t.codi|lower }}" class="selector-card selector-card--{{ t.codi|lower }}">
      <img src="{% static 'mm-design/icons/territories/territory-' %}{{ t.codi|lower }}.svg" alt="" class="selector-badge" width="80" height="80">
      <h2 class="selector-card-title">{{ t.nom }}</h2>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
