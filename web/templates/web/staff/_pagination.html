{% load staff_tags %}
{% if page.has_other_pages %}
<nav class="pagination" aria-label="Paginació">
  {% if page.has_previous %}
  <a href="?{% query_string page=page.previous_page_number %}" class="pagination-link">&larr; Anterior</a>
  {% endif %}
  <span class="pagination-info">Pàgina {{ page.number }} de {{ page.paginator.num_pages }}</span>
  {% if page.has_next %}
  <a href="?{% query_string page=page.next_page_number %}" class="pagination-link">Següent &rarr;</a>
  {% endif %}
</nav>
{% endif %}
