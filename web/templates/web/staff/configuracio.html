{% extends "web/staff/base_staff.html" %}

{% block staff_title %}Configuració{% endblock %}

{% block staff_content %}
<section class="ranking-header">
  <h2 class="ranking-title">Configuració global</h2>
  <p class="ranking-date">Coeficients de l'algorisme de ranking</p>
</section>

<form method="post" class="auth-form">
  {% csrf_token %}

  {% for f in fields %}
  <div class="form-field">
    <label class="form-label" for="{{ f.name }}">{{ f.label }}</label>
    <input type="text" name="{{ f.name }}" id="{{ f.name }}" value="{{ f.value }}"
      style="max-width:200px">
    {% if f.help %}<span class="staff-cell-muted">{{ f.help }}</span>{% endif %}
  </div>
  {% endfor %}

  <div class="staff-confirm-actions">
    <button type="submit" class="filter-btn">Desar</button>
    <a href="{% url 'staff:dashboard' %}" class="filter-btn staff-btn--cancel">Tornar</a>
  </div>
</form>
{% endblock %}
