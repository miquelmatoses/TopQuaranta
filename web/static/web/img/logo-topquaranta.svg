<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="TopQuaranta">
  <style>
    .logo-top {
      fill: var(--mm-color-black, #111111);
      font-family: var(--mm-font-display, "Playfair Display", Georgia, serif);
      font-weight: var(--mm-weight-bold, 700);
      font-size: var(--mm-text-5xl, 3rem);
    }
    .logo-quaranta {
      fill: var(--mm-color-black, #111111);
      font-family: var(--mm-font-display, "Playfair Display", Georgia, serif);
      font-weight: var(--mm-weight-bold, 700);
      font-size: var(--mm-text-5xl, 3rem);
    }
    .logo-bar-1 { fill: var(--mm-color-yellow, #f1c22f); }
    .logo-bar-2 { fill: var(--mm-color-red, #cf3339); }
    .logo-bar-3 { fill: var(--mm-color-blue, #0047ba); }
    .logo-bar-4 { fill: var(--mm-color-green, #427c42); }
  </style>
  <!-- Wordmark -->
  <text class="logo-top" x="0" y="50">Top</text>
  <text class="logo-quaranta" x="96" y="50">Quaranta</text>
  <!-- Color bars -->
  <rect class="logo-bar-1" x="0" y="64" width="90" height="6" rx="3"/>
  <rect class="logo-bar-2" x="95" y="64" width="90" height="6" rx="3"/>
  <rect class="logo-bar-3" x="190" y="64" width="90" height="6" rx="3"/>
  <rect class="logo-bar-4" x="285" y="64" width="75" height="6" rx="3"/>
</svg>
